services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: registers
      POSTGRES_PASSWORD: registers
      POSTGRES_DB: registers_test
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U registers -d registers_test"]
      interval: 2s
      timeout: 3s
      retries: 30

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: registers_test
      MYSQL_USER: registers
      MYSQL_PASSWORD: registers
    command: ["--default-authentication-plugin=mysql_native_password"]
    ports:
      - "33069:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u registers -pregisters"]
      interval: 2s
      timeout: 3s
      retries: 40
