services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: functionals
      POSTGRES_PASSWORD: functionals
      POSTGRES_DB: functionals_test
    ports:
      - "54329:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U functionals -d functionals_test"]
      interval: 2s
      timeout: 3s
      retries: 30

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: functionals_test
      MYSQL_USER: functionals
      MYSQL_PASSWORD: functionals
    ports:
      - "33069:3306"
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot"]
      interval: 2s
      timeout: 3s
      retries: 60
      start_period: 20s
